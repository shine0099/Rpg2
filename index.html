<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Depaysement RPG</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=EB+Garamond:wght@400;500&display=swap');

* {margin:0;padding:0;box-sizing:border-box;}
body {
    font-family:'EB Garamond',serif;
    background:#0b0b0b;
    color:#e8d9a6;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}
.container {
    width:100%;
    max-width:900px;
    background:#141414;
    border:2px solid #d4af37;
    border-radius:16px;
    padding:40px;
    box-shadow:0 0 40px rgba(212,175,55,0.3);
}
h1 {font-family:'Cinzel',serif;text-align:center;color:#d4af37;margin-bottom:20px;}
.progress {height:6px;background:#333;border-radius:4px;overflow:hidden;margin-bottom:30px;}
.progress-bar {height:100%;width:0%;background:#d4af37;transition:0.4s ease;}
.step {display:none;animation:fade 0.4s ease;}
.step.active {display:block;}
@keyframes fade {from{opacity:0;transform:translateX(15px);}to{opacity:1;transform:translateX(0);}}
label {display:block;margin-top:15px;color:#d4af37;}
input, textarea, select {width:100%;padding:10px;margin-top:5px;background:#1c1c1c;border:1px solid #d4af37;border-radius:6px;color:#e8d9a6;}
input::placeholder, textarea::placeholder {color:#d4af37;}
button {margin-top:20px;padding:10px;width:100%;background:#d4af37;border:none;border-radius:6px;font-weight:bold;cursor:pointer;transition:0.3s;}
button:hover {background:#e6c96d;}
.buttons {display:flex;gap:10px;}
.hidden {display:none;}
.preview {margin-top:10px;max-width:150px;border:1px solid #d4af37;border-radius:8px;}
.attr-box {border:1px solid #d4af37;padding:15px;margin-top:15px;border-radius:8px;position:relative;background:linear-gradient(145deg,#141414,#1c1c1c);}
.dice-canvas {width:100%;height:150px;display:block;margin-top:10px;}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
<div class="container">
<h1>Registro das Essências</h1>
<div class="progress">
    <div class="progress-bar" id="progressBar"></div>
</div>

<form id="form" action="https://formsubmit.co/gsousamesuquita09@gmail.com" method="POST" enctype="multipart/form-data">

<!-- ETAPA 1 -->
<div class="step active">
    <h2>Identidade</h2>
    <label>Tipo</label>
    <select name="Tipo" id="tipo" required onchange="toggleSideQuest()">
        <option value="">Escolha</option>
        <option value="Player">Player</option>
        <option value="Convidado">Convidado</option>
    </select>
    <label>Nome</label><input type="text" name="Nome" placeholder="Nome completo ou apelido" required>
    <label>Idade</label><input type="number" name="Idade" placeholder="Idade do personagem" required>
    <label>Gênero</label><input type="text" name="Genero" placeholder="Masculino, Feminino, Outro">
    <label>Pronomes</label><input type="text" name="Pronomes" placeholder="Ex: Ele/Dele, Ela/Dela, Elle/Delx">
    <div class="buttons">
        <button type="button" onclick="nextStep()">Próximo</button>
    </div>
</div>

<!-- ETAPA 2 -->
<div class="step">
    <h2>Presença</h2>
    <label>Como ele fala?</label>
    <textarea name="Fala" placeholder="Ex: sotaque marcante, fala pausada"></textarea>
    
    <label>Hábitos peculiares</label>
    <textarea name="Habitos" placeholder="Ex: bate as asas mais rápido quando mente"></textarea>
    
    <label>Imagem principal</label>
    <input type="file" name="imagem_personagem" accept="image/*" onchange="previewImage(event,'preview1')">
    <img id="preview1" class="preview hidden">
    
    <label>Vibe das roupas</label>
    <input type="file" name="vibe_roupas" accept="image/*" multiple>
    
    <label>Arma do personagem</label>
    <input type="file" name="arma_personagem" accept="image/*" onchange="previewImage(event,'preview2')">
    <img id="preview2" class="preview hidden">

    <div id="sideQuest" class="hidden">
        <h3>Side Quest (Convidado)</h3>
        <label>Como sua história cruza com a dos players?</label>
        <textarea name="SideQuest" placeholder="Descreva a ligação do seu personagem com os players"></textarea>
    </div>
    
    <div class="buttons">
        <button type="button" onclick="prevStep()">Voltar</button>
        <button type="button" onclick="nextStep()">Próximo</button>
    </div>
</div>

<!-- ETAPA 3 -->
<div class="step">
    <h2>Psicológico</h2>
    <label>Maior desejo</label><textarea name="Desejo" placeholder="Ex: conquistar a glória, descobrir um segredo"></textarea>
    <label>Maior medo</label><textarea name="Medo" placeholder="Ex: aranhas, escuro, traidores"></textarea>
    <label>Prioridade acima da ética</label><textarea name="Prioridade" placeholder="Ex: salvar a vida da irmã em troca do grupo"></textarea>
    <label>Fraqueza</label><textarea name="Fraqueza" placeholder="Ex: impulsivo, fraco fisicamente"></textarea>
    <label>Segredo</label><textarea name="Segredo" placeholder="Ex: esconde algo do passado"></textarea>
    
    <h2>Atributos (Rolar D20)</h2>
    <div id="attributesContainer"></div>
    
    <div class="buttons">
        <button type="button" onclick="prevStep()">Voltar</button>
        <button type="submit">Enviar Registro</button>
    </div>
</div>

<input type="hidden" name="_captcha" value="false">
<input type="hidden" name="_next" value="https://seusite.github.io/obrigado.html">

</form>
</div>

<script>
// Multi-step
let currentStep = 0;
const steps = document.querySelectorAll(".step");
const progressBar = document.getElementById("progressBar");

function showStep(i) {
    steps.forEach((s,j)=>s.classList.toggle("active",i===j));
    progressBar.style.width = ((i+1)/steps.length)*100 + "%";
}

function nextStep() { if(currentStep < steps.length-1) { currentStep++; showStep(currentStep); } }
function prevStep() { if(currentStep > 0) { currentStep--; showStep(currentStep); } }
showStep(currentStep);

// Side quest toggle
function toggleSideQuest(){
    const tipo = document.getElementById("tipo").value;
    document.getElementById("sideQuest").classList.toggle("hidden", tipo !== "Convidado");
}

// Preview de imagem
function previewImage(event, id) {
    const reader = new FileReader();
    reader.onload = function() {
        const img = document.getElementById(id);
        img.src = reader.result;
        img.classList.remove("hidden");
    };
    reader.readAsDataURL(event.target.files[0]);
}

// D20 3D amarelo com sombra
const attributes = ["Força","Destreza","Constituição","Inteligência","Sabedoria","Carisma"];
const rolled = {};
const container = document.getElementById("attributesContainer");

attributes.forEach(attr => {
    const div = document.createElement("div");
    div.className = "attr-box";
    div.innerHTML = `
        <label>${attr}</label>
        <input type="number" name="${attr}" id="${attr}" readonly>
        <div class="dice-canvas" id="dice${attr}"></div>
        <button type="button" onclick="rollDice('${attr}')">Rolar D20</button>
    `;
    container.appendChild(div);
});

// D20 usando Three.js
function rollDice(attribute){
    if(rolled[attribute]) return alert(`${attribute} já rolado!`);
    
    const canvasDiv = document.getElementById("dice"+attribute);
    canvasDiv.innerHTML = ""; // limpa canvas
    const width = canvasDiv.clientWidth;
    const height = 150;

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, width/height, 0.1, 1000);
    camera.position.z = 4;

    const renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
    renderer.setSize(width,height);
    canvasDiv.appendChild(renderer.domElement);

    const light = new THREE.DirectionalLight(0xffffff,1);
    light.position.set(5,5,5);
    scene.add(light);

    const geo = new THREE.IcosahedronGeometry(1,0);
    const mat = new THREE.MeshStandardMaterial({color:0xffd700, roughness:0.6, metalness:0.8});
    const dice = new THREE.Mesh(geo, mat);
    scene.add(dice);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableZoom = false;
    controls.enablePan = false;

    // Som
    const audio = new Audio('https://freesound.org/data/previews/66/66717_931655-lq.mp3'); // rolar dado
    audio.volume = 0.3;
    audio.play();

    let frames = 0;
    function animate(){
        requestAnimationFrame(animate);
        if(frames < 60){
            dice.rotation.x += 0.2 + Math.random()*0.1;
            dice.rotation.y += 0.2 + Math.random()*0.1;
            frames++;
        }
        renderer.render(scene,camera);
    }
    animate();

    setTimeout(()=>{
        const result = Math.floor(Math.random()*20)+1;
        document.getElementById(attribute).value = result;
        rolled[attribute] = true;
    },1500);
}
</script>
</body>
</html>
